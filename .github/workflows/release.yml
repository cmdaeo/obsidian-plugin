name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Verify tag matches manifest.json version
        id: version_check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match manifest.json version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "✓ Version check passed: $TAG"

      - name: Confirm release assets exist
        run: |
          for f in release/main.js release/manifest.json release/styles.css; do
            [ -f "$f" ] && echo "✓ $f" || (echo "::error::Missing: $f" && exit 1)
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'release/*'

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version_check.outputs.tag }}"
          NOTES=$(awk '/^## \['"$TAG"'\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Release $TAG"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Git Sync $TAG" \
            --notes "$NOTES" \
            release/main.js \
            release/manifest.json \
            release/styles.css
          echo "✓ Released $TAG"

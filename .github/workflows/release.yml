name: Release Obsidian plugin

# Trigger: push any tag like "1.0.0", "1.2.3", "2.0.0-beta.1"
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Create GitHub release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Git Sync $TAG" \
            --notes "See [CHANGELOG.md](./CHANGELOG.md) for details." \
            release/main.js \
            release/manifest.json \
            release/styles.css
